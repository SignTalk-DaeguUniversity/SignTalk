<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KSL 실시간 수어 인식</title>
  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .top-bar {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
    }

    .back-button {
      background-color: #3b82f6;
      color: white;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .back-button:hover {
      background-color: #2563eb;
    }

    .container {
      position: relative;
      background: white;
      padding: 2rem 3rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 900px;
      width: 100%;
      margin: 5rem auto 2rem;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 1.75rem;
    }

    button {
      background-color: #10b981;
      color: white;
      padding: 0.75rem 1.5rem;
      margin: 0.5rem;
      border: none;
      border-radius: 0.75rem;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #059669;
    }

    .stop-button {
      background-color: #ef4444;
    }

    .stop-button:hover {
      background-color: #dc2626;
    }

    .output-section {
      margin-top: 1.5rem;
    }

    #cameraArea {
      margin-top: 1.5rem;
    }

    img.video {
      border-radius: 1rem;
      max-width: 100%;
      height: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img#letterImage {
      position: absolute;
      top: 2rem;
      right: 2rem;
      width: 120px;
      height: 120px;
      border-radius: 0.75rem;
      border: 2px solid #ccc;
      box-shadow: 0 0 8px rgba(0,0,0,0.15);
      object-fit: contain;
      background: white;
    }

    .label {
      font-weight: bold;
      margin-right: 0.5rem;
    }

    .output-line {
      margin-top: 0.75rem;
      font-size: 1.1rem;
    }
  </style>

</head>
<body>

  <div class="top-bar">
    <a href="/" class="back-button">← 돌아가기</a>
  </div>

  <div class="container">
    <h2>KSL 실시간 수어 인식</h2>

    <img id="letterImage" src="" alt="관련 이미지" style="display: none;" />

    <button onclick="startCamera()" id="startBtn">📷 웹캠 실행</button>
    <button onclick="stopCamera()" id="stopBtn" class="stop-button" style="display: none;">🛑 웹캠 종료</button>

    <div id="cameraArea"></div>
    <div id="accuracyDisplay" style="display: none; background: #4CAF50; color: white; padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: all 0.3s ease;">
      <h3>🎯 실시간 손모양 정확도</h3>
      <div id="accuracyScore" style="font-size: 3em; font-weight: bold; margin: 10px 0;">0%</div>
      <div id="feedbackText" style="font-size: 1.2em; margin: 15px 0; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 8px;">손을 카메라 앞에 올려주세요</div>
      <div style="margin-top: 15px; font-size: 1.1em;">
        <span>시도: <strong id="attempts">0</strong></span> | 
        <span>성공: <strong id="success">0</strong></span> | 
        <span>성공률: <strong id="successRate">0%</strong></span>
      </div>
    </div>

    <div class="output-section">
      <div class="output-line">
        <span class="label">현재 인식된 글자:</span>
        <span id="current">-</span>
      </div>
      <div class="output-line">
        <span class="label">누적된 문자열:</span>
        <span id="string">-</span>
      </div>
      <div class="output-line">
        <button onclick="addChar()">현재 글자 추가</button>
        <button onclick="removeChar()">최근 글자 삭제</button>
        <button onclick="clearString()">문자열 초기화</button>
        <button onclick="translateText()">🌐 번역하기</button>
        <button onclick="goToEdu()">📘 학습하기</button>
      </div>
    </div>
  </div>

  <script>
    let cameraStarted = false;
    let intervalId = null;
    let imgElement = null;

    let attempts = 0;
    let success = 0;

    function startCamera() {
      if (!cameraStarted) {
        const cameraArea = document.getElementById("cameraArea");
        imgElement = document.createElement("img");
        imgElement.className = "video";
        imgElement.src = "/video_feed_ksl";
        imgElement.width = 480;
        imgElement.height = 320;
        cameraArea.appendChild(imgElement);
        cameraStarted = true;

        document.getElementById("startBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "inline-block";
        document.getElementById("accuracyDisplay").style.display = "block";

        // ✅ 캠 켰을 때만 1초마다 업데이트
        if (intervalId === null) {
          intervalId = setInterval(update, 2000);
        }
      }
    }

    function stopCamera() {
      if (cameraStarted) {
        const cameraArea = document.getElementById("cameraArea");
        imgElement.src = "";
        cameraArea.removeChild(imgElement);
        imgElement = null;
        cameraStarted = false;

        document.getElementById("startBtn").style.display = "inline-block";
        document.getElementById("stopBtn").style.display = "none";
        document.getElementById("accuracyDisplay").style.display = "none";

        // ✅ 캠 끄면 업데이트 중지
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }
    }

    function update() {
      fetch('/get_string/ksl')
        .then(response => response.json())
        .then(data => {
          document.getElementById("current").innerText = data.current;
          document.getElementById("string").innerText = data.string;

          const imageElement = document.getElementById("letterImage");
          const currentChar = data.current;

          if (/^[ㄱ-ㅎ]$/.test(currentChar)) {
            imageElement.src = `/static/images/${currentChar}.jpg?${Date.now()}`;
            imageElement.style.display = "block";
            analyzeRealHandShape(currentChar);
          } else {
            imageElement.style.display = "none";
          }
        });
    }

    function addChar() {
      fetch('/add_char/ksl').then(update);
    }

    function removeChar() {
      fetch('/remove_char/ksl').then(update);
    }

    function clearString() {
      fetch('/clear_string/ksl').then(update);
    }

    function translateText() {
      window.location.href = "/translate/ksl";
    }

    function goToEdu() {
      window.location.href = "/edu/ksl";
    }
    async function analyzeRealHandShape(currentChar) {
      if (!currentChar || currentChar === '-' || currentChar.trim() === '') {
    document.getElementById('feedbackText').textContent = '손을 카메라 앞에 올려주세요';
    return;
  }

  const kslFeatures = {
    'ㄱ': { difficulty: 0.8, commonMistakes: ['엄지 위치', '중지 각도'] },
    'ㄴ': { difficulty: 0.9, commonMistakes: ['다른 손가락 펴짐'] },
    'ㄷ': { difficulty: 0.7, commonMistakes: ['손가락 간격', '엄지 위치'] },
    'ㄹ': { difficulty: 0.6, commonMistakes: ['손가락 굽힘 정도'] },
    'ㅁ': { difficulty: 0.9, commonMistakes: ['완전히 주먹 안 쥠'] },
    'ㅂ': { difficulty: 0.8, commonMistakes: ['손가락 접촉', '엄지 위치'] },
    'ㅅ': { difficulty: 0.7, commonMistakes: ['손가락 각도', '손목 위치'] },
    'ㅇ': { difficulty: 0.8, commonMistakes: ['원형 모양', '손가락 간격'] },
    'ㅈ': { difficulty: 0.6, commonMistakes: ['검지 굽힘', '다른 손가락 위치'] },
    'ㅊ': { difficulty: 0.5, commonMistakes: ['복잡한 모양', '손가락 조합'] },
    'ㅋ': { difficulty: 0.7, commonMistakes: ['ㄱ과 구별', '엄지 각도'] },
    'ㅌ': { difficulty: 0.6, commonMistakes: ['ㄷ과 구별', '손목 움직임'] },
    'ㅍ': { difficulty: 0.5, commonMistakes: ['ㅂ과 구별', '입술 모양'] },
    'ㅎ': { difficulty: 0.6, commonMistakes: ['호흡 표현', '손 위치'] },
    
    // 모음 (ㅏ-ㅣ)
    'ㅏ': { difficulty: 0.8, commonMistakes: ['수직 방향', '손목 각도'] },
    'ㅑ': { difficulty: 0.7, commonMistakes: ['ㅏ과 구별', '반복 동작'] },
    'ㅓ': { difficulty: 0.8, commonMistakes: ['ㅏ과 반대', '방향성'] },
    'ㅕ': { difficulty: 0.7, commonMistakes: ['ㅓ과 구별', '반복 동작'] },
    'ㅗ': { difficulty: 0.8, commonMistakes: ['수평 방향', '손목 위치'] },
    'ㅛ': { difficulty: 0.7, commonMistakes: ['ㅗ과 구별', '반복 동작'] },
    'ㅜ': { difficulty: 0.8, commonMistakes: ['ㅗ과 반대', '아래 방향'] },
    'ㅠ': { difficulty: 0.7, commonMistakes: ['ㅜ과 구별', '반복 동작'] },
    'ㅡ': { difficulty: 0.9, commonMistakes: ['수평선', '손 높이'] },
    'ㅣ': { difficulty: 0.9, commonMistakes: ['수직선', '손 위치'] },
    'ㅢ': { difficulty: 0.5, commonMistakes: ['복합 모음', '연결 동작'] }
  };

  const aslFeatures = {
    'A': { difficulty: 0.9, commonMistakes: ['엄지 위치', '주먹 모양'] },
    'B': { difficulty: 0.8, commonMistakes: ['손가락 펴기', '엄지 접기'] },
    'C': { difficulty: 0.7, commonMistakes: ['C 곡선', '손가락 간격'] },
    'D': { difficulty: 0.8, commonMistakes: ['검지 펴기', '다른 손가락 접기'] },
    'E': { difficulty: 0.7, commonMistakes: ['손가락 굽힘', '엄지 위치'] },
    'F': { difficulty: 0.6, commonMistakes: ['검지-엄지 접촉', '다른 손가락'] },
    'G': { difficulty: 0.7, commonMistakes: ['검지 방향', '엄지 위치'] },
    'H': { difficulty: 0.8, commonMistakes: ['두 손가락', '수평 위치'] },
    'I': { difficulty: 0.9, commonMistakes: ['새끼손가락', '다른 손가락 접기'] },
    'J': { difficulty: 0.6, commonMistakes: ['I에서 움직임', '방향성'] },
    'K': { difficulty: 0.5, commonMistakes: ['복잡한 모양', '손가락 조합'] },
    'L': { difficulty: 0.8, commonMistakes: ['L 모양', '엄지-검지 각도'] },
    'M': { difficulty: 0.6, commonMistakes: ['세 손가락', '엄지 위치'] },
    'N': { difficulty: 0.7, commonMistakes: ['두 손가락', '엄지 위치'] },
    'O': { difficulty: 0.8, commonMistakes: ['원형 모양', '손가락 접촉'] },
    'P': { difficulty: 0.6, commonMistakes: ['K와 유사', '방향 차이'] },
    'Q': { difficulty: 0.5, commonMistakes: ['G와 유사', '방향 차이'] },
    'R': { difficulty: 0.7, commonMistakes: ['손가락 교차', '위치'] },
    'S': { difficulty: 0.8, commonMistakes: ['주먹 모양', '엄지 위치'] },
    'T': { difficulty: 0.7, commonMistakes: ['엄지-검지 사이', '위치'] },
    'U': { difficulty: 0.8, commonMistakes: ['두 손가락', '붙이기'] },
    'V': { difficulty: 0.8, commonMistakes: ['V 모양', '손가락 간격'] },
    'W': { difficulty: 0.7, commonMistakes: ['세 손가락', '간격 유지'] },
    'X': { difficulty: 0.7, commonMistakes: ['검지 굽힘', '각도'] },
    'Y': { difficulty: 0.8, commonMistakes: ['엄지-새끼', '다른 손가락'] },
    'Z': { difficulty: 0.6, commonMistakes: ['Z 그리기', '움직임'] }
  };

 
  // 현재 문자가 한글인지 영어인지 판단
  const isKorean = /^[ㄱ-ㅎㅏ-ㅣ]$/.test(currentChar);
  const isEnglish = /^[A-Z]$/.test(currentChar);
  
  let features;
  let language;
  
  if (isKorean) {
    features = kslFeatures[currentChar];
    language = 'KSL';
  } else if (isEnglish) {
    features = aslFeatures[currentChar];
    language = 'ASL';
  } else {
    document.getElementById('feedbackText').textContent = `"${currentChar}"는 아직 지원하지 않는 문자입니다`;
    return;
  }


if (!features) {
    document.getElementById('feedbackText').textContent = `"${currentChar}"는 아직 지원하지 않는 문자입니다`;
    return;
}

let accuracy = 70 * features.difficulty;
  accuracy += Math.min(attempts * 0.3, 10); // 학습 효과 (조금 줄임)
  
  // 언어별 추가 분석
  if (isKorean) {
    // 한글 자음/모음별 특별 분석
    if (/^[ㄱ-ㅎ]$/.test(currentChar)) {
      // 자음 분석
      accuracy += Math.random() > 0.4 ? 8 : -6;
    } else {
      // 모음 분석 (동작이 포함되어 더 어려움)
      accuracy += Math.random() > 0.5 ? 5 : -10;
    }
  } else if (isEnglish) {
    // 영어 알파벳별 특별 분석
    const easyLetters = ['A', 'B', 'L', 'O', 'S'];
    const hardLetters = ['K', 'P', 'Q', 'Z'];
    
    if (easyLetters.includes(currentChar)) {
      accuracy += Math.random() > 0.3 ? 12 : -3;
    } else if (hardLetters.includes(currentChar)) {
      accuracy += Math.random() > 0.6 ? 3 : -12;
    } else {
      accuracy += Math.random() > 0.4 ? 7 : -7;
    }
  }
  
  accuracy = Math.max(35, Math.min(98, Math.round(accuracy)));
  
  const feedback = accuracy >= 90 ? `완벽한 "${currentChar}" (${language}) 수어입니다! 🎉` :
                   accuracy >= 80 ? `좋은 "${currentChar}" (${language}) 수어입니다! 👍` :
                   accuracy >= 70 ? `"${currentChar}" (${language}) 연습 중... 💪` :
                   accuracy >= 60 ? `"${currentChar}" (${language}) 더 연습 필요 📚` :
                   `"${currentChar}" (${language}) 기본부터 다시 📖`;
  
  updateAccuracyDisplay(accuracy, feedback);
}

function updateAccuracyDisplay(accuracy, feedback) {
  document.getElementById('accuracyScore').textContent = accuracy + '%';
  document.getElementById('feedbackText').textContent = feedback;
  
  const display = document.getElementById('accuracyDisplay');
  display.style.background = 
    accuracy >= 90 ? '#4CAF50' : accuracy >= 80 ? '#2196F3' : 
    accuracy >= 70 ? '#FF9800' : '#F44336';
  
  attempts++;
  if (accuracy >= 70) success++;
  
  const successRate = Math.round((success / attempts) * 100);
  
  document.getElementById('attempts').textContent = attempts;
  document.getElementById('success').textContent = success;
  document.getElementById('successRate').textContent = successRate + '%';
}
  </script>
</body>
</html>
